name: Build Production Release

on:
  release:
    branches: [main]
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rojo
        run: cargo install rojo --version 7.7.0-rc.1

      - name: Install dependencies
        run: npm i 

      - name: Compile Roblox Ts 
        run: npx rbxtsc --rojo build.project.json 
      
      - name: Build  
        run: rojo build build.project.json -o build.rbxl

      - name: Rename build
        run: mv build.rbxl sessions-board-${{ github.event.release.tag_name }}.rbxl

      - name: Attach build to release
        uses: softprops/action-gh-release@v2
        with:
          files: sessions-board-*.rbxl